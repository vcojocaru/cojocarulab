</div> <script src="js/jquery-3.3.1.min.js"></script>

<script src="js/main.js"></script>

<script>
  async function loadNews() {
    const container = document.getElementById('news-feed');
    try {
      const response = await fetch('content/news.json');
      const newsItems = await response.json();

      let htmlOutput = '';

      newsItems.forEach(item => {
        // Build the Learn More button only if a link exists
        const linkHtml = item.link && item.link !== "#"
          ? `<a href="${item.link}" class="btn btn-primary mr-2 mb-2">Learn more</a>`
          : "";

        // The template matches your visuals exactly
        htmlOutput += `
          <div class="site-section py-4">
            <div class="container">
              <div class="row align-items-center">
                <div class="col-md-4 mb-4 mb-lg-0">
                  <img src="${item.image}" alt="Image" class="img-fluid" style="display: block; margin: auto;">
                </div>
                <div class="col-md-8">
                  <h2 class="section-title mb-2" style="font-size: 24px; color:black">${item.title}</h2>
                  ${item.subtitle1 ? `<h2 class="section-sub-title mb-1">${item.subtitle1}</h2>` : ''}
                  ${item.subtitle2 ? `<h2 class="section-sub-title mb-3">${item.subtitle2}</h2>` : ''}
                  <p style="text-align: justify; color: #555;">${item.body}</p>
                  ${linkHtml}
                </div>
              </div>
              <div class="container"><hr color="#46ddb0"></div>
            </div>
          </div>
        `;
      });
      container.innerHTML = htmlOutput;
    } catch (e) {
      console.error("Error loading news:", e);
    }
  }
  window.onload = loadNews;
</script>
